<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; font: 13px -apple-system, BlinkMacSystemFont, sans-serif; color: #eee; background: #2b2b2b; -webkit-app-region: drag; user-select: none; }
  .wrap { padding: 10px 12px; }
  .preview { color: #aaa; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
  .preview.empty { font-style: italic; }
  input { -webkit-app-region: no-drag; width: 100%; box-sizing: border-box; padding: 8px 10px; font-size: 14px; border: 1px solid #555; border-radius: 4px; background: #1e1e1e; color: #eee; outline: none; }
  input:focus { border-color: #4a90e2; }
  input:disabled { opacity: 0.6; }
</style>
</head>
<body>
<div class="wrap">
  <div id="preview" class="preview empty">(no selection — instruction only)</div>
  <input id="input" type="text" placeholder="Instruction… (Enter to submit, Esc to close)" autofocus />
</div>
<script>
  const previewEl = document.getElementById('preview');
  const inputEl = document.getElementById('input');
  let selection = '';

  window.api.onInit(({ selection: sel }) => {
    selection = sel || '';
    if (selection) {
      const trimmed = selection.replace(/\s+/g, ' ').trim();
      previewEl.textContent = trimmed.length > 100 ? trimmed.slice(0, 100) + '…' : trimmed;
      previewEl.classList.remove('empty');
    } else {
      previewEl.textContent = '(no selection — instruction only)';
      previewEl.classList.add('empty');
    }
    inputEl.value = '';
    inputEl.disabled = false;
    inputEl.focus();
  });

  inputEl.addEventListener('keydown', async (e) => {
    if (e.key === 'Escape') { window.api.close(); return; }
    if (e.key !== 'Enter') return;
    const instruction = inputEl.value.trim();
    if (!instruction) return;
    inputEl.disabled = true;
    try {
      await window.api.submit(instruction);
    } finally {
      window.api.close();
    }
  });
</script>
</body>
</html>
