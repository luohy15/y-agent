<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; font: 13px -apple-system, BlinkMacSystemFont, sans-serif; color: #eee; background: #2b2b2b; -webkit-app-region: drag; user-select: none; }
  .wrap { padding: 10px 12px; }
  .head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .check { color: #4caf50; font-weight: bold; }
  .label { font-weight: 500; }
  .preview { color: #aaa; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .preview.empty { font-style: italic; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><span class="check">✓</span><span class="label">Copied to clipboard</span></div>
  <div id="preview" class="preview empty">(empty)</div>
</div>
<script>
  const previewEl = document.getElementById('preview');
  let dismissTimer = null;

  window.api.onResult(({ result }) => {
    const trimmed = (result || '').replace(/\s+/g, ' ').trim();
    if (trimmed) {
      previewEl.textContent = trimmed.length > 100 ? trimmed.slice(0, 100) + '…' : trimmed;
      previewEl.classList.remove('empty');
    } else {
      previewEl.textContent = '(empty)';
      previewEl.classList.add('empty');
    }
    if (dismissTimer) clearTimeout(dismissTimer);
    dismissTimer = setTimeout(() => window.api.closeResult(), 1800);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') window.api.closeResult();
  });
</script>
</body>
</html>
